# == Application ==========================================================
spring.application.name=meditrack-backend
server.port=${PORT:8080}

# === Database ==========================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# == HikariCP ==========================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# == JPA / Hibernate ==========================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never

# == Flyway ==========================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# == JWT ==========================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# == Admin seed ==========================================================
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@meditrack.local}
app.admin.password=${ADMIN_PASSWORD}

# == CORS ==========================================================
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# == Brute force protection ==========================================================
security.max-login-attempts=${MAX_LOGIN_ATTEMPTS:5}
security.lockout-minutes=${LOCKOUT_MINUTES:15}

# == AI providers ==========================================================
ai.groq.api-key=${GROQ_API_KEY:}
ai.groq.model=llama-3.1-8b-instant
ai.groq.enabled=true
ai.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.openrouter.model=openai/gpt-oss-120b:free
ai.openrouter.enabled=true
ai.service.url=${AI_SERVICE_URL:http://localhost:5000}
ai.service.api-key=${AI_SERVICE_API_KEY:}

# == Actuator ==========================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# == Logging _ production: no stack traces in responses ================
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
logging.level.root=WARN
logging.level.com.MediTrack=INFO
logging.level.org.springframework.security=WARN

# == Async (for AuditLogService @Async writes) =======================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100

# == Scheduling (RefreshTokenService cleanup + AlertScheduler) ======
spring.task.scheduling.pool.size=2
