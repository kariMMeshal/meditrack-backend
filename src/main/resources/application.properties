# ===============================
# = APPLICATION
# ===============================
spring.application.name=meditrack-backend
server.port=${PORT:8080}

# ===============================
# = DATABASE
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = CONNECTION POOL (HikariCP)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.sql.init.mode=never

# ===============================
# = JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ===============================
# = ADMIN SEED
# ===============================
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@meditrack.local}
app.admin.password=${ADMIN_PASSWORD}

# ===============================
# = CORS
# ===============================
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# ===============================
# = ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ===============================
# = AI SERVICE(Later)
# ===============================
ai.service.url=${AI_SERVICE_URL:http://localhost:5000}
ai.service.api-key=${AI_SERVICE_API_KEY}
#openai.model=gpt-4o-mini

# Circuit breaker
resilience4j.circuitbreaker.instances.mlService.sliding-window-size=10
resilience4j.circuitbreaker.instances.mlService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mlService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.mlService.permitted-number-of-calls-in-half-open-state=3

# Retry
resilience4j.retry.instances.mlService.max-attempts=2
resilience4j.retry.instances.mlService.wait-duration=500ms
resilience4j.retry.instances.mlService.retry-exceptions=org.springframework.web.client.ResourceAccessException

# ===============================
# = DEV ONLY (uncomment when needed)
# ===============================
# logging.level.org.springframework.security=DEBUG
# spring.security.user.name=admin
# spring.security.user.password=admin123
# spring.security.user.roles=ADMIN
# server.servlet.session.timeout=30m

# ===============================
# = GROQ (Primary LLM)
# ===============================
ai.groq.api-key=${GROQ_API_KEY:}
ai.groq.model=llama-3.1-8b-instant
ai.groq.enabled=true

# ===============================
# = OPENROUTER (Fallback LLM)
# ===============================
ai.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.openrouter.model=openai/gpt-oss-120b:free
ai.openrouter.enabled=true
